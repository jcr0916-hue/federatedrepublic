<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Living Crossroads — The Federated Republic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Jost:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A; --navy2:#0f1e38; --gold:#C9A84C; --gold2:#a8843a;
    --cream:#F5F0E8; --cream2:#EDE7D8; --text:#2a2a2a; --muted:#7a7060;
    --border:#d4c9b0; --white:#ffffff;
    --rise:#3f7d54; --fall:#b0553f; --ink:#141d30;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--text);font-family:'Jost',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:44rem;margin:0 auto;padding:2rem 1.25rem 5rem}

  /* ---- Masthead ---- */
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold2);margin-bottom:.9rem}
  h1.title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(2.1rem,6vw,3rem);color:var(--navy);line-height:1.08;margin-bottom:1rem}
  h1.title em{font-style:italic;color:var(--gold2)}

  /* ---- Premise / on-ramp ---- */
  .premise{font-size:1.05rem;line-height:1.75;color:#40372c;margin-bottom:1.5rem}
  .scope{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.8rem}
  .scope .chip{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--cream2);border:1px solid var(--border);border-radius:999px;padding:.3rem .7rem}
  .start-btn{font-family:'Jost',sans-serif;font-weight:600;font-size:1rem;color:var(--navy2);background:var(--gold);border:none;border-radius:6px;padding:.9rem 2.2rem;cursor:pointer;transition:background .15s,transform .1s}
  .start-btn:hover{background:var(--gold2)}
  .start-btn:active{transform:translateY(1px)}

  /* ---- Inline definitions (the on-ramp) ---- */
  def-term, .def{border-bottom:1px dotted var(--gold2);cursor:help;position:relative;color:var(--navy)}
  .def:hover .def-pop, .def:focus .def-pop{opacity:1;visibility:visible;transform:translateY(0)}
  .def-pop{position:absolute;left:0;bottom:calc(100% + .5rem);width:min(18rem,80vw);background:var(--ink);color:#eee;font-family:'Jost',sans-serif;font-size:.82rem;line-height:1.5;padding:.6rem .8rem;border-radius:7px;opacity:0;visibility:hidden;transform:translateY(4px);transition:opacity .16s,transform .16s,visibility .16s;z-index:20;box-shadow:0 8px 24px rgba(15,30,56,.28);letter-spacing:normal;text-transform:none;font-weight:400}
  .def-pop::after{content:"";position:absolute;top:100%;left:1.2rem;border:6px solid transparent;border-top-color:var(--ink)}

  /* ---- Meters ---- */
  .meters{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;position:sticky;top:0;background:var(--cream);padding:1rem 0 .9rem;z-index:10;border-bottom:1px solid var(--border);margin-bottom:1.6rem}
  .meter-label{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;display:flex;justify-content:space-between;align-items:baseline}
  .meter-val{font-weight:700;color:var(--navy);font-size:.72rem}
  .meter-val.flash-up{color:var(--rise)}
  .meter-val.flash-down{color:var(--fall)}
  .meter-bar{height:5px;background:var(--cream2);border-radius:3px;overflow:hidden}
  .meter-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0;transition:width .6s cubic-bezier(.4,0,.2,1)}

  /* ---- Scene ---- */
  .scene-tag{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);margin-bottom:.7rem}
  .scene-body{font-family:'Cormorant Garamond',serif;font-size:clamp(1.25rem,3.4vw,1.6rem);line-height:1.45;color:var(--ink);margin-bottom:1.6rem;font-weight:500}
  .response{background:var(--white);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:1rem 1.15rem;margin-bottom:1.5rem;font-size:1.02rem;line-height:1.7;color:#3a3226;animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ---- Choices ---- */
  .choices{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.3rem}
  .choice{position:relative;text-align:left;font-family:'Jost',sans-serif;font-size:.98rem;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:.9rem 1.1rem;cursor:pointer;transition:border-color .14s,background .14s,transform .08s;color:var(--ink)}
  .choice:hover{border-color:var(--gold2);background:#fffdf7}
  .choice:active{transform:translateY(1px)}
  .freetext-wrap{margin-top:.4rem}
  .freetext-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
  textarea.freetext{width:100%;min-height:3.4rem;font-family:'Jost',sans-serif;font-size:.98rem;line-height:1.5;color:var(--ink);background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:.8rem 1rem;resize:vertical;transition:border-color .14s}
  textarea.freetext:focus{outline:none;border-color:var(--gold2)}
  .ft-row{display:flex;gap:.6rem;align-items:center;margin-top:.6rem}
  .ft-send{font-family:'Jost',sans-serif;font-weight:600;font-size:.9rem;color:var(--navy2);background:var(--gold);border:none;border-radius:6px;padding:.6rem 1.4rem;cursor:pointer;transition:background .15s}
  .ft-send:hover{background:var(--gold2)}
  .ft-send:disabled{opacity:.5;cursor:default}
  .ft-hint{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.06em;color:var(--muted)}
  .thinking{font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.08em;color:var(--muted);padding:.5rem 0}
  .thinking span{animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  /* ---- Ending ---- */
  .ending{background:var(--navy);color:var(--cream);border-radius:12px;padding:2rem 1.6rem;margin-top:1rem}
  .ending h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.9rem;color:var(--gold);margin-bottom:1rem}
  .ending p{font-size:1.02rem;line-height:1.75;color:#e8e0d0;margin-bottom:1.2rem}
  .ending .final-meters{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin:1.3rem 0}
  .ending .fm{text-align:center}
  .ending .fm-val{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--gold)}
  .ending .fm-label{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:#b8ac93}
  .replay{font-family:'Jost',sans-serif;font-weight:500;font-size:.9rem;color:var(--navy2);background:var(--gold);border:none;border-radius:6px;padding:.7rem 1.6rem;cursor:pointer}

  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <!-- INTRO -->
  <div id="intro">
    <div class="eyebrow">Living Crossroads · A choice in real time</div>
    <h1 class="title" id="introTitle"></h1>
    <p class="premise" id="introPremise"></p>
    <div class="scope" id="introScope"></div>
    <button class="start-btn" onclick="CR.start()">Step in →</button>
    <p class="ft-hint" style="margin-top:1.2rem">Hover any <span class="def" style="border-bottom:1px dotted var(--gold2)">underlined term<span class="def-pop">Terms you might not know are defined on hover, so you can start without reading anything else first.</span></span> for a quick definition. Nothing you do here is saved.</p>
  </div>

  <!-- PLAY -->
  <div id="play" class="hidden">
    <div class="meters" id="meters"></div>
    <div id="sceneArea"></div>
  </div>
</div>

<script>
const CR = (function(){
  let data=null, meters={}, current=null, busy=false;

  const EMBEDDED = {
  "id": "thoss-y13m7",
  "title": "The Dark Horse",
  "premise": "You are <def term=\"Elin Thoss\">Elin Thoss</def>, Assembly member for <def term=\"Selvane\">Selvane's third district</def>. This afternoon your <def term=\"border-infrastructure bill\">border-infrastructure bill</def> passed the floor, 163 to 31. You never gave a speech about the crisis that made it necessary — you wrote a law instead. Now the capital is asking a question you have refused to answer for two months: what are you actually running for? Three things move as you decide — your <def term=\"Standing\">Standing</def>, your <def term=\"Allies\">Allies</def>, and your <def term=\"Intent\">Intent</def>.",
  "note": "SEALED. Thoss canon crossroads.",
  "glossary": {
    "Elin Thoss": "An Assembly member who became a national name by accident — an off-microphone remark that went viral — and has refused to say what office, if any, she wants.",
    "Selvane": "A central heartland state. Not on the national border. Thoss has represented its third district for six years.",
    "border-infrastructure bill": "Thoss's law funding the border territories that were left under-resourced before the Varda Crossing crisis. It just passed 163 to 31.",
    "Standing": "Your credibility and momentum as a national figure. It rises when you look competent and serious, falls when you look like just another candidate.",
    "Allies": "The people actually willing to back you — co-sponsors, blocs, caucuses. Votes and cover, not applause.",
    "Intent": "How openly you've committed to seeking power. Low means you're still 'just a legislator.' High means everyone knows you're reaching for something.",
    "Legat Consul": "One of the Republic's two co-equal executives — the one who handles the military and foreign affairs. Chosen nationally. Three people are already running for it.",
    "Civic Consul": "The Republic's other executive — the domestic one. Not elected by the public: chosen by the Assembly, from its own members. A quieter path to power than the Legat Consul race.",
    "the Assembly": "The Republic's popularly elected legislative chamber. It writes laws — and it chooses the Civic Consul from among its own members.",
    "Government Formation": "The Assembly's process for electing a Civic Consul from its members — by an absolute majority that must name its choice, not merely reject others.",
    "Speaker": "The Assembly's presiding officer. A standing office, chosen by the chamber, that carries real weight in who can build a majority.",
    "Seren Mak": "An Assembly member from Rhovane running for Legat Consul. Loud, fast, fond of 'postures.' First to speak after every crossing.",
    "Tobias Vael": "A Senator running for Legat Consul. Slow and deliberate, still recovering from an early misstep in the crisis.",
    "Ines Carrow": "A Director running for Legat Consul. Answers by publishing verified intelligence — the one thing only she can do.",
    "Member Orin": "The Korda Assembly member who co-sponsored your bill. A border-territory voice who trusted you with their name.",
    "Territorial Caucus": "The bloc of Assembly members from the border territories and smaller states — under-resourced, often overlooked, and the constituency your bill actually served."
  },
  "articles": ["§2.5 the Civic Consul", "§2.6 / §2.6.a Government Formation", "§2.1 the Legat Consul", "§3.2 the Assembly & Speaker"],
  "meters": [
    {"id": "standing", "label": "Standing", "start": 62, "min": 0, "max": 100},
    {"id": "allies", "label": "Allies", "start": 44, "min": 0, "max": 100},
    {"id": "intent", "label": "Intent", "start": 20, "min": 0, "max": 100}
  ],
  "scenes": [
    {
      "id": "s1",
      "title": "The Morning After",
      "body": "The bill passed yesterday. This morning your office has fourteen interview requests, a Territorial Caucus that suddenly returns your calls, and three declared <def term=\"Legat Consul\">Legat Consul</def> candidates who spent last night explaining why a bill that isn't about their race doesn't change their race. Member Orin has asked, quietly, what you want to do with this. You have a window — days, not weeks — before the moment cools. How do you use it?",
      "buttons": [
        {"label": "Say nothing new — let the bill speak, stay the conscientious legislator", "route": "s1_quiet"},
        {"label": "Signal interest in the Legat Consul race without declaring", "route": "s1_lc_flirt"},
        {"label": "Quietly ask Orin who in the Assembly would follow you", "route": "s1_count"}
      ],
      "freetext": true,
      "dimensions": ["who (Orin, the Caucus, the LC field, the press, the Assembly)", "what (consolidate, signal, count votes, build, deflect)", "how (public, private, through a proxy)"],
      "fragments": {
        "s1_quiet": {"text": "You issue the same two-sentence statement you always do: thanks to the chamber, thanks to Orin by name, nothing further. It reads as discipline, and discipline is its own kind of message — the woman who won't campaign keeps not campaigning, and keeps being talked about for it. But a window that isn't used is a window that closes. The Caucus that returned your calls this morning notices you didn't pick up.", "desc": "Stay the conscientious legislator; issue nothing new; let the bill speak. WHAT: deflect/consolidate the existing image. HOW: public restraint. Preserves the dark-horse mystique but spends the moment.", "deltas": {"standing": 3, "allies": -4, "intent": -2}, "next": "s2"},
        "s1_lc_flirt": {"text": "You let a line slip in a hallway — that you 'haven't ruled anything out.' It's four words and it detonates. By afternoon you are, in the framing of every political desk in Verentum, the fourth Legat Consul candidate, the one who arrived by law instead of speech. It's a bigger stage. It's also Mak's and Vael's and Carrow's stage, and they have been building on it for two months while you built a bridge line-item.", "desc": "Signal interest in the LEGAT CONSUL race without formally declaring. WHO: the press/the LC field. WHAT: signal ambition. HOW: semi-public. Moves onto the national stage but onto rivals' turf.", "deltas": {"standing": 5, "allies": 2, "intent": 14}, "next": "s2"},
        "s1_count": {"text": "You don't ask Orin what you should do. You ask what you *have* — quietly, one question: who in the Assembly would follow you, if it came to that? Orin doesn't ask 'follow you where.' They just start naming people: the Territorial Caucus, obviously; a cluster of second-term members from the smaller states who are tired of being governed by people who campaign at them; a few surprises. Not a majority. But the beginning of the arithmetic of one — the kind of arithmetic that matters in <def term=\"the Assembly\">the Assembly</def>, not on a debate stage.", "desc": "Privately count who in the ASSEMBLY would back you — the arithmetic of an internal majority (the Civic Consul route, though unnamed). WHO: Orin, the Caucus, Assembly members. WHAT: count votes/build quietly. HOW: private. Points toward the CC route without declaring anything.", "deltas": {"standing": 2, "allies": 8, "intent": 6}, "next": "s2"},
        "s1_press_terms": {"text": "You do give the press something — but not about a race. You take the fourteen requests and grant one, to the driest policy desk in Verentum, and spend forty minutes on why the border territories were vulnerable in the first place. No ambition, all substance. It lands better than any declaration could: you become, for a week, the person who is *serious* while everyone else is *running*. Standing you can't buy. But you've also told everyone watching exactly nothing about what you'll do with it.", "desc": "Engage the press but ONLY on substance/policy, refusing the race framing entirely. WHO: press. WHAT: build credibility through substance, deflect ambition. HOW: public but non-committal. Raises Standing, keeps Intent low.", "deltas": {"standing": 8, "allies": 1, "intent": -1}, "next": "s2"},
        "s1_caucus": {"text": "You call the Territorial Caucus back — all of them, not one. You don't pitch a candidacy; you ask what they need next, now that the bill has proven the border territories can win something when someone actually writes for them. It's a listening move, and it reads as one, but every person in that room does the same quiet arithmetic Orin did: a member who delivers *and* convenes is a member who could be more than a member. You didn't ask for anything. You didn't have to.", "desc": "Convene the TERRITORIAL CAUCUS as a bloc — listen, don't pitch — building a base that reads as a coalition without a declaration. WHO: the Caucus. WHAT: build/consolidate a bloc. HOW: private-ish, relationship. Strong Allies gain.", "deltas": {"standing": 3, "allies": 10, "intent": 4}, "next": "s2"}
      },
      "outOfBounds": {"text": "That's a real lever in the Republic — but not one in front of you this morning. The question the moment is asking is narrower: what do you, an Assembly member with a passed bill and a closing window, do with the next few days?", "next": "s1"}
    },
    {
      "id": "s2",
      "title": "Someone Says It First",
      "body": "It doesn't stay your secret. At the end of the week a member of the Territorial Caucus, in a corridor, tells a reporter what several people have been saying independently: that the most interesting figure in the Republic right now is the one who isn't running for anything — and maybe that's the point. The word that appears in the next morning's coverage is one you never used about yourself: <def term=\"Civic Consul\">Civic Consul</def>. The quiet office. The one the Assembly fills from its own. Now everyone is looking at you to see if you flinch.",
      "buttons": [
        {"label": "Deny it — you're focused on your district, full stop", "route": "s2_deny"},
        {"label": "Don't confirm, don't deny — let the question hang", "route": "s2_hang"},
        {"label": "Redirect everyone to the Legat Consul race instead", "route": "s2_pivot_lc"}
      ],
      "freetext": true,
      "dimensions": ["who (the press, the Assembly, the Caucus, the LC field, Orin)", "what (deny, embrace, deflect, reframe, build)", "how (public statement, private signal, silence)"],
      "fragments": {
        "s2_deny": {"text": "You deny it cleanly: you're focused on Selvane's third district, and the Assembly chooses its executives on its own timeline, not a reporter's. It's true, and it's disciplined, and it costs you. A denial is a decision. The members who had started to imagine backing you hear a door close, and doors are hard to reopen. Your mystique survives. Your arithmetic doesn't.", "desc": "DENY interest in the Civic Consul path; reaffirm focus on the district. WHAT: deny/close the door. HOW: public. Protects standing/mystique but sheds the coalition that was forming.", "deltas": {"standing": 2, "allies": -9, "intent": -8}, "next": "s3"},
        "s2_hang": {"text": "You don't confirm and you don't deny. Asked directly, you say the Assembly's business is the Assembly's, and that you have nothing to add — which is, of course, itself an answer, because a denial would have been easy and you didn't give one. The question hangs. And a hanging question, in the Republic's quiet office, is worth more than a declaration: it lets the arithmetic build without giving your rivals a target to shoot at. Every member now wondering is a member you haven't spent.", "desc": "Neither confirm nor deny — let the Civic Consul question hang, keeping options open and rivals without a target. WHAT: strategic ambiguity. HOW: public non-answer. The classic dark-horse hold; builds quiet momentum.", "deltas": {"standing": 4, "allies": 5, "intent": 8}, "next": "s3"},
        "s2_pivot_lc": {"text": "You try to send everyone back to the race they were already covering — you praise the Legat Consul field, note the real contest is there, decline the premise. But it reads as protesting too much. You've spent two months making silence mean something; a sudden eagerness to point at someone else's race just draws a brighter circle around your own. The Civic Consul word doesn't go away. It sticks harder.", "desc": "Try to REDIRECT attention to the Legat Consul race to deflect the Civic Consul talk. WHO: the LC field. WHAT: deflect via misdirection. HOW: public. Backfires — reads as protesting too much.", "deltas": {"standing": -4, "allies": -2, "intent": 3}, "next": "s3"},
        "s2_own_it": {"text": "You do the thing no one expects, which by now is your signature: you take the question seriously, out loud. You say the <def term=\"Civic Consul\">Civic Consul</def> is chosen by the Assembly from members who've shown they can build something, and that if the chamber ever thought you were such a member, you'd consider it an honor to be considered — no more, no less. It is not a declaration. It is something rarer: a candidacy that stays inside the chamber's gift, offered to the only electorate that fills that office. The members hear exactly what you meant them to.", "desc": "OWN the Civic Consul framing openly but on the constitution's terms — the office is the Assembly's to give, and you'd be honored to be considered. WHAT: embrace, but route legitimacy through the chamber not the public. HOW: public, principled. High-intent, high-allies, the boldest honest move.", "deltas": {"standing": 6, "allies": 9, "intent": 18}, "next": "s3"},
        "s2_orin_shield": {"text": "You let Orin answer for you. The Korda member — whose name you've now thanked from the floor twice — tells the press what you won't: that the Assembly has always chosen its own executives by its own judgment, and that the members will decide who has earned consideration when the time comes. It's your position, in someone else's mouth, which means it's your position without your fingerprints. The arithmetic keeps building. Orin, by carrying your water in public, becomes something more than a co-sponsor.", "desc": "Have MEMBER ORIN carry the response as a proxy — your position without your fingerprints. WHO: Orin. WHAT: advance the CC framing by proxy. HOW: proxy-public. Builds allies, keeps your own intent semi-veiled, deepens the Orin alliance.", "deltas": {"standing": 3, "allies": 11, "intent": 7}, "next": "s3"}
      },
      "outOfBounds": {"text": "A real move in the Republic's politics — but the question in the room right now is tighter: the word Civic Consul is in the morning's coverage, and everyone is watching to see how you answer it. That's the choice in front of you.", "next": "s2"}
    },
    {
      "id": "s3",
      "title": "The Arithmetic",
      "body": "The <def term=\"Civic Consul\">Civic Consul</def> is not won in public. It is won in the Assembly, by <def term=\"Government Formation\">an absolute majority that names its choice</def> — and a majority is built one member at a time, in offices and corridors, not on RNN. Whatever you've said publicly, the real question is now private: can the votes actually be there? You have Orin, the Territorial Caucus, and a scatter of the disaffected. You do not yet have a majority. And the current <def term=\"Speaker\">Speaker</def> — who matters enormously to any Assembly majority — has not said a word to you.",
      "buttons": [
        {"label": "Go to the Speaker directly and make your case", "route": "s3_speaker"},
        {"label": "Build the bloc outward from the Caucus first, Speaker later", "route": "s3_bloc"},
        {"label": "Keep your powder dry — you're not sure you want this", "route": "s3_hold"}
      ],
      "freetext": true,
      "dimensions": ["who (the Speaker, the Caucus, wavering members, Orin, a rival)", "what (whip votes, win the Speaker, consolidate, negotiate, wait)", "how (direct, through proxies, coalition assembly, hold)"],
      "fragments": {
        "s3_speaker": {"text": "You go to the Speaker — the one office whose weight can make or break an Assembly majority. You don't ask for an endorsement; you ask a harder, smarter question: what would a Civic Consul from the Territorial Caucus have to be, for the Speaker to see it as good for the chamber rather than a faction's win? The Speaker doesn't commit. But they don't show you the door either — and 'not the door' from the Speaker, this early, is worth more than a dozen soft yeses from members who follow where the Speaker leads.", "desc": "Approach the SPEAKER directly — not for endorsement but to find the terms on which the Speaker could accept a Territorial-Caucus Civic Consul. WHO: the Speaker. WHAT: win the pivotal actor. HOW: direct, sophisticated ask. High-value: the Speaker is the hinge of any majority.", "deltas": {"standing": 5, "allies": 12, "intent": 6}, "next": "s4"},
        "s3_bloc": {"text": "You build outward first — Caucus solid, then the smaller-state members, then the second-termers tired of being campaigned at. It's real coalition work and it adds real names. But you've left the Speaker for last, and the Speaker notices being left for last. By the time you come to them you've built a bloc that looks, from the chair, less like a coalition and more like a challenge. The votes are closer. The hinge is harder.", "desc": "Build the bloc OUTWARD from the Caucus first, saving the Speaker for later. WHO: Caucus, small-state members, wavering members. WHAT: whip votes broadly. HOW: coalition assembly. Gains allies but risks alienating the pivotal Speaker.", "deltas": {"standing": 3, "allies": 9, "intent": 8}, "next": "s4"},
        "s3_hold": {"text": "You stop. Not a no — a genuine pause. You are not sure you want the quiet office, or any office; the viral moment was never a campaign, and the honest part of you that wrote a bill instead of a speech wonders if governing from a committee room served the border territories better than governing from an executive chair ever would. Holding costs you momentum — arithmetic decays when it isn't tended. But it keeps something rarer than a majority: the freedom to have meant it when you said you weren't running.", "desc": "HOLD — genuine uncertainty about whether she wants the office at all. WHAT: wait/preserve optionality. HOW: hold. Momentum decays but authenticity and freedom are preserved. A real, non-cynical path.", "deltas": {"standing": 1, "allies": -6, "intent": -10}, "next": "s4"},
        "s3_speaker_proxy": {"text": "You don't go to the Speaker yourself — you send the arithmetic ahead of you. You have Orin and two Caucus seniors let it be known, quietly, that a Territorial-Caucus Civic Consul is becoming thinkable, and you let that reach the Speaker as a fact of the chamber rather than a request from you. When you finally speak to the Speaker, you're not asking them to consider something new; you're asking them to notice something already true. It's a subtler approach and it keeps your own hands clean — but subtlety can read as maneuvering if the Speaker prefers to be asked straight.", "desc": "Approach the Speaker INDIRECTLY — let proxies establish the coalition as a fact the Speaker discovers, rather than a direct ask. WHO: Speaker via Orin/proxies. WHAT: win the hinge by indirection. HOW: proxy. Clever but riskier than a direct ask.", "deltas": {"standing": 2, "allies": 8, "intent": 7}, "next": "s4"},
        "s3_rival_convert": {"text": "You do something audacious: you go to the member most likely to run against you for the Caucus's own loyalty — a respected small-state voice who could split your base — and you offer them the thing that costs you most and binds them hardest. Not a bribe. A role: co-architect of what a Territorial-Caucus government would actually do, named and real, if the arithmetic comes together. You've turned a potential rival into a partner and closed a fault line before it opened. The bloc is suddenly not just bigger but sturdier — and it's no longer only *yours*, which is exactly what makes it hold.", "desc": "CONVERT a potential rival for the Caucus's loyalty into a partner by offering a real shared role — closing a fault line and making the bloc sturdier and co-owned. WHO: a rival/wavering leader. WHAT: facilitate-mutual-solution / co-opt. HOW: private negotiation. High-skill move; strong durable allies.", "deltas": {"standing": 6, "allies": 13, "intent": 9}, "next": "s4"}
      },
      "outOfBounds": {"text": "A real instrument somewhere in the Republic — but the arithmetic in front of you is the Assembly's, and it's built member by member. The question is how you assemble a majority that doesn't exist yet.", "next": "s3"}
    },
    {
      "id": "s4",
      "title": "The Threshold",
      "body": "It comes faster than anyone expected. A cluster of members — enough to matter — send word through Orin: they're ready to move, but they need to know you're real. Not a hint, not a hanging question. They need to know that if they put their names to <def term=\"Government Formation\">a motion that names you</def>, you won't leave them exposed by demurring at the last moment. The dark horse has run a long way on not-declaring. This is the fence. What you do here is what you are.",
      "buttons": [
        {"label": "Commit — tell them yes, if they build it you will stand", "route": "s4_commit"},
        {"label": "Ask for more time — one more round of counting", "route": "s4_wait"},
        {"label": "Decline the office but deliver the bloc to someone worthy", "route": "s4_kingmaker"}
      ],
      "freetext": true,
      "dimensions": ["who (the ready members, Orin, the Speaker, the Caucus)", "what (commit, delay, redirect, decline)", "how (private pledge, public step, conditional)"],
      "fragments": {
        "s4_commit": {"text": "You tell them yes. Quietly, to the people who asked, in the only room where it counts: if they build the majority, you will stand, and you will not leave them holding a motion with no candidate at the end of it. It is the first unambiguous thing you have said about your own ambition in two months, and you say it not to a camera but to a handful of members deciding whether to risk their names on you. That is the right electorate for this office. The arithmetic stops being hypothetical.", "desc": "COMMIT privately to the ready members — yes, if they build the majority you will stand. WHAT: commit, decisively, to the chamber's process. HOW: private pledge to the real electorate. The decisive Civic-Consul-route move.", "deltas": {"standing": 6, "allies": 10, "intent": 20}, "next": "resolve"},
        "s4_wait": {"text": "You ask for one more round of counting — you want to be sure before you let people risk their names. It's prudent, and prudence has served you. But there is a moment when caution stops reading as care and starts reading as fear, and the members at the fence are close to that line. Some will wait with you. Some will decide that a candidate who won't commit when the votes are nearly there is telling them something, and quietly step back down.", "desc": "Ask for MORE TIME / another count before committing. WHAT: delay. HOW: cautious hold at the threshold. Prudent but risks reading as fear; sheds some of the ready coalition.", "deltas": {"standing": -2, "allies": -7, "intent": -2}, "next": "resolve"},
        "s4_kingmaker": {"text": "You decline — but you don't waste what you built. You take the bloc you assembled and you hand it, whole, to a member you believe would govern the border territories better than the office would let you: perhaps Orin, perhaps a Caucus senior with a decade more chamber craft. You become the kingmaker rather than the king, and you do it on purpose. It is a smaller chair for you and a larger legacy: the woman who could have taken the office and instead built someone else into it. Not everyone will believe you meant it. The ones who were in the room will.", "desc": "DECLINE the office but deliver the assembled bloc to a worthier candidate (Orin or a Caucus senior) — become kingmaker not king. WHAT: redirect the coalition, decline power. HOW: deliberate. A genuine, honorable alternative ending.", "deltas": {"standing": 4, "allies": 3, "intent": -4}, "next": "resolve"},
        "s4_conditional": {"text": "You give them something between a hint and a pledge — a real condition. You tell them you'll stand, but only if the majority is genuine and stable, not a fragile plurality that collapses at the first hard vote and leaves the border territories worse off for having reached. You won't take the office to lose it in a season. It's a demand for quality, not just quantity, and it makes the members take their own arithmetic more seriously. The strong version of your coalition gets stronger; the weak version never forms. You've made your yes worth more by making it conditional.", "desc": "Give a CONDITIONAL commitment — yes, but only on a genuine, stable majority, not a fragile one. WHAT: commit with a quality condition. HOW: private, principled. Strengthens a real coalition, filters out a weak one. A sophisticated commit.", "deltas": {"standing": 5, "allies": 8, "intent": 15}, "next": "resolve"}
      },
      "outOfBounds": {"text": "There are other things a person could do in politics — but not here, not at this fence. The members are asking one question and it has a small number of honest answers: are you real, or not?", "next": "s4"}
    }
  ],
  "endings": {
    "resolve": {
      "title": "What the Dark Horse Was",
      "text": "The story of Elin Thoss resolves in the Republic's canon soon — and where it lands depends on the road you walked to get here, written in your three meters. A high <def term=\"Intent\">Intent</def> and a real coalition mean the quiet office is genuinely within reach: the Assembly may yet fill its domestic chair from among its own with the member who wrote a law instead of a speech. A strong base but a guarded hand means the dark horse stays a dark horse a while longer — powerful precisely because undeclared. A collapse of Allies means the moment passes, and she returns to the committee room that suited her. And a coalition handed to another means she was never the candidate — she was the maker of one. You reached one of several endings the Assembly's arithmetic allows. The real Elin Thoss walked one of these roads too. When her story publishes, you'll know which — and whether the path you chose was the one that became true.",
      "meterReading": true
    }
  }
};
  async function load(){
    data = EMBEDDED;
    document.getElementById('introTitle').innerHTML = data.title;
    document.getElementById('introPremise').innerHTML = defify(data.premise);
    document.getElementById('introScope').innerHTML =
      data.articles.map(a=>`<span class="chip">${a}</span>`).join('');
  }

  // Replace <def term="X">label</def> with hover spans from glossary
  function defify(html){
    return html.replace(/<def term="([^"]+)">([^<]+)<\/def>/g, (m, term, label)=>{
      const d = (data.glossary && data.glossary[term]) || term;
      return `<span class="def" tabindex="0">${label}<span class="def-pop">${d}</span></span>`;
    });
  }

  function start(){
    meters = {};
    data.meters.forEach(m=> meters[m.id]=m.start);
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('play').classList.remove('hidden');
    renderMeters(true);
    goScene(data.scenes[0].id);
  }

  function renderMeters(init, deltas){
    const el = document.getElementById('meters');
    el.innerHTML = data.meters.map(m=>{
      const v = meters[m.id];
      const pct = Math.max(0,Math.min(100,(v-m.min)/(m.max-m.min)*100));
      let cls='';
      if(deltas && deltas[m.id]>0) cls='flash-up';
      else if(deltas && deltas[m.id]<0) cls='flash-down';
      return `<div class="meter">
        <div class="meter-label"><span>${m.label}</span><span class="meter-val ${cls}">${v}</span></div>
        <div class="meter-bar"><div class="meter-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }

  function applyDeltas(deltas){
    if(!deltas) return;
    Object.entries(deltas).forEach(([k,v])=>{
      if(meters[k]!==undefined) meters[k]=Math.max(0,Math.min(100,meters[k]+v));
    });
    renderMeters(false, deltas);
  }

  function scene(id){ return data.scenes.find(s=>s.id===id); }

  function goScene(id){
    current = scene(id);
    const area = document.getElementById('sceneArea');
    area.innerHTML = `
      <div class="scene-tag">${current.title}</div>
      <div class="scene-body">${defify(current.body)}</div>
      <div class="choices" id="choices">
        ${current.buttons.map(b=>`<button class="choice" data-route="${b.route}">${defify(b.label)}</button>`).join('')}
      </div>
      ${current.freetext ? freetextBlock() : ''}
    `;
    area.querySelectorAll('.choice').forEach(btn=>{
      btn.addEventListener('click', ()=> chooseButton(btn.dataset.route));
    });
    if(current.freetext){
      const send = document.getElementById('ftSend');
      const ta = document.getElementById('ftInput');
      send.addEventListener('click', ()=> chooseFreeText(ta.value));
      ta.addEventListener('keydown', e=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)) chooseFreeText(ta.value); });
    }
  }

  function freetextBlock(){
    return `<div class="freetext-wrap">
      <div class="freetext-label">— or say it in your own words</div>
      <textarea class="freetext" id="ftInput" placeholder="Describe the move you want to make…"></textarea>
      <div class="ft-row">
        <button class="ft-send" id="ftSend">Make this move</button>
        <span class="ft-hint">The game reads your intent and routes to a written outcome. It never invents new text.</span>
      </div>
    </div>`;
  }

  function chooseButton(route){
    if(busy) return;
    const frag = current.fragments[route];
    if(!frag){ console.warn('no fragment for', route); return; }
    resolve(frag);
  }

  async function chooseFreeText(text){
    if(busy) return;
    text = (text||'').trim();
    if(!text) return;
    busy = true;
    const choices = document.getElementById('choices');
    const ftwrap = document.querySelector('.freetext-wrap');
    ftwrap.innerHTML = `<div class="thinking">reading your move<span>.</span><span>.</span><span>.</span></div>`;

    let route;
    try {
      route = await classify(text);
    } catch(e){
      route = null;
    }

    if(route === 'needs_detail'){
      // ask for the missing piece, keep the player in the scene
      const ftwrap = document.querySelector('.freetext-wrap');
      if(ftwrap){ ftwrap.innerHTML = ''; }
      showResponse("That's a real move — but who are you bringing it to, or how public do you want it? Say a little more and I'll play it out.", null, ()=> goScene(current.id), true);
      busy=false;
      return;
    }
    if(route === 'out_of_bounds' || !route || !current.fragments[route]){
      // graceful in-world redirect, replay the scene
      const oob = current.outOfBounds;
      showResponse(oob.text, null, ()=> goScene(oob.next), true);
      busy=false;
      return;
    }
    const frag = current.fragments[route];
    resolve(frag);
    busy=false;
  }

  // REAL CLASSIFIER — calls /api/crossroads (Sonnet 5). Returns a fragment id.
  // Falls back to a local keyword stub if the API is unreachable (e.g. local file view).
  async function classify(text){
    // Build the fragment descriptor list for the classifier (id + desc only — never the text)
    const fragments = Object.entries(current.fragments).map(([id,f])=>({ id, desc: f.desc || '' }));
    try {
      const res = await fetch('/api/crossroads', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          move: text,
          sceneTitle: current.title,
          sceneBody: current.body.replace(/<[^>]+>/g,''),
          dimensions: current.dimensions || ['who','what','how'],
          fragments
        })
      });
      if(!res.ok) throw new Error('api '+res.status);
      const data = await res.json();
      if(data && data.fragment) return data.fragment; // 'out_of_bounds' | 'needs_detail' | fragmentId
      throw new Error('no fragment');
    } catch(e){
      // fallback: local keyword stub so the harness still runs offline
      return stubClassify(text);
    }
  }

  // Offline fallback only. The deployed feature uses the Sonnet classifier above.
  async function stubClassify(text){
    await new Promise(r=>setTimeout(r, 400));
    const t = text.toLowerCase();
    if(current.id==='s1'){
      if(/(caucus|territorial|convene|listen|bloc|base)/.test(t)) return 's1_caucus';
      if(/(count|who would follow|arithmetic|orin.*who|how many|whip)/.test(t)) return 's1_count';
      if(/(press|substance|policy|interview|serious|why.*vulnerable)/.test(t)) return 's1_press_terms';
      if(/(legat|lc race|the race|haven't ruled|signal.*race|fourth candidate)/.test(t)) return 's1_lc_flirt';
      if(/(nothing|quiet|stay|let the bill|two.sentence|discipline)/.test(t)) return 's1_quiet';
      return 'out_of_bounds';
    }
    if(current.id==='s2'){
      if(/(own it|honor to be considered|chamber.*gift|take the question|serious.*out loud)/.test(t)) return 's2_own_it';
      if(/(orin.*answer|proxy|through orin|let orin|someone else.*say)/.test(t)) return 's2_orin_shield';
      if(/(hang|neither|don't confirm|nothing to add|leave it open|ambiguit)/.test(t)) return 's2_hang';
      if(/(deny|focused on.*district|rule.*out|close the door)/.test(t)) return 's2_deny';
      if(/(pivot|redirect|point.*legat|their race|send.*back)/.test(t)) return 's2_pivot_lc';
      return 'out_of_bounds';
    }
    if(current.id==='s3'){
      if(/(rival|convert|partner|co-architect|fault line|split.*base|opponent.*role)/.test(t)) return 's3_rival_convert';
      if(/(proxy|through orin|let.*known|indirect|ahead of|discover)/.test(t)) return 's3_speaker_proxy';
      if(/(speaker.*direct|go to the speaker|the speaker|hinge|make.*case)/.test(t)) return 's3_speaker';
      if(/(outward|bloc first|caucus first|build.*out|later)/.test(t)) return 's3_bloc';
      if(/(hold|powder|not sure|pause|wait.*want|uncertain)/.test(t)) return 's3_hold';
      return 'out_of_bounds';
    }
    if(current.id==='s4'){
      if(/(conditional|only if.*stable|genuine.*majority|not.*fragile|quality|won't take.*lose)/.test(t)) return 's4_conditional';
      if(/(commit|yes.*stand|tell them yes|if they build|i will stand)/.test(t)) return 's4_commit';
      if(/(king|decline.*deliver|give.*bloc|orin.*instead|hand.*to|worthy)/.test(t)) return 's4_kingmaker';
      if(/(more time|wait|another count|not yet|be sure)/.test(t)) return 's4_wait';
      return 'out_of_bounds';
    }
    return 'out_of_bounds';
  }

  function resolve(frag){
    applyDeltas(frag.deltas);
    showResponse(frag.text, frag.deltas, ()=>{
      if(frag.next && data.endings[frag.next]) showEnding(frag.next);
      else if(frag.next) goScene(frag.next);
    });
  }

  function showResponse(text, deltas, cont, isRedirect){
    const area = document.getElementById('sceneArea');
    area.innerHTML = `
      <div class="scene-tag">${current.title}</div>
      <div class="response">${defify(text)}</div>
      <button class="start-btn" id="contBtn">${isRedirect ? 'Try another move' : 'Continue →'}</button>
    `;
    document.getElementById('contBtn').addEventListener('click', cont);
  }

  function showEnding(id){
    const e = data.endings[id];
    const area = document.getElementById('sceneArea');
    area.innerHTML = `
      <div class="ending">
        <h2>${e.title}</h2>
        <p>${defify(e.text)}</p>
        <div class="final-meters">
          ${data.meters.map(m=>`<div class="fm"><div class="fm-val">${meters[m.id]}</div><div class="fm-label">${m.label}</div></div>`).join('')}
        </div>
        <button class="replay" onclick="CR.replay()">Play again</button>
      </div>`;
    document.querySelector('.meters').style.display='none';
  }

  function replay(){
    document.querySelector('.meters').style.display='';
    start();
  }

  load();
  return { start, replay };
})();
</script>
