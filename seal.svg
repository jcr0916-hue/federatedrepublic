      .philosophy-text { font-family: 'Cinzel', 'Georgia', serif; font-size: 10px; fill: #C5A059; letter-spacing: 2px; }
      .center-element { fill: none; stroke: #111827; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
