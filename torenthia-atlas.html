<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Atlas — The Federated Republic</title>
  <meta name="description" content="The world Torenthia lives in — the Republic's place on the map of the known world.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
  <style>
    body{background:#0a0f1a}
    .atlas-stage{position:relative;width:100%;height:calc(100vh - 62px);min-height:480px;margin-top:62px;overflow:hidden;background:#0a0f1a}
    .tier{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity .65s ease, transform .65s ease}
    .tier.hidden{opacity:0;pointer-events:none}
    @media (prefers-reduced-motion: reduce){.tier{transition:none}}

    /* ---- Tier 1: the world ---- */
    #tier1 .frame{position:relative;max-width:min(96vw, calc((100vh - 130px) * 2));width:100%}
    #tier1 img{width:100%;height:auto;display:block;border:3px solid #6a5a38;border-radius:3px;box-shadow:0 10px 42px rgba(0,0,0,.75)}
    .hotspot{position:absolute;transform:translate(-50%,-50%);cursor:pointer;background:none;border:none;padding:22px}
    .hs-dot{position:relative;display:block;width:11px;height:11px;border-radius:50%;background:var(--gold);border:2px solid rgba(255,255,255,.85);box-shadow:0 0 8px rgba(201,168,76,.9)}
    .hs-ring{position:absolute;left:50%;top:50%;width:11px;height:11px;border-radius:50%;border:2px solid var(--gold);transform:translate(-50%,-50%);animation:hsRing 2.4s infinite ease-out;pointer-events:none}
    .hs-ring.r2{animation-delay:1.2s}
    @keyframes hsRing{0%{transform:translate(-50%,-50%) scale(1);opacity:.85}100%{transform:translate(-50%,-50%) scale(4.2);opacity:0}}
    .hs-label{position:absolute;left:34px;top:50%;transform:translateY(-50%);white-space:nowrap;font-family:'Cormorant Garamond',serif;font-size:.95rem;letter-spacing:.22em;color:#e9ddba;text-shadow:0 1px 6px rgba(0,0,0,.8);border-bottom:1px solid rgba(201,168,76,.6);padding-bottom:2px}
    .hs-label::before{content:"";position:absolute;left:-24px;top:50%;width:20px;height:1px;background:rgba(201,168,76,.6)}
    .tier1-caption{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(233,221,186,.55)}

  </style>
</head>
<body>
  <a href="#main-content" class="skip-nav">Skip to main content</a>
  <div id="site-nav"></div>

  <div class="atlas-stage" id="main-content">

    <!-- Tier 1 -->
    <div class="tier" id="tier1">
      <div class="frame">
        <img src="world-map-tier1.webp" alt="World map. Torenthia's region is marked on the western coast of the crescent continent." onerror="this.onerror=null;this.src='world-map-tier1.jpg'">
        <button class="hotspot" id="hotspot" aria-label="Return to the Federated Republic">
          <span class="hs-ring"></span><span class="hs-ring r2"></span>
          <span class="hs-dot"></span>
          <span class="hs-label">THE FEDERATED REPUBLIC</span>
        </button>
      </div>
      <div class="tier1-caption">The Known World &middot; Select the Republic to return home</div>
    </div>


  <script src="map-data.js"></script>
  <script>
  (function(){
    const T1 = MAP_DATA.tier1;
    const hs = document.getElementById('hotspot');
    hs.style.left = (T1.hotspot.x / T1.w * 100) + '%';
    hs.style.top  = (T1.hotspot.y / T1.h * 100) + '%';
    hs.addEventListener('click', ()=>{ window.location.href = 'torenthia.html'; });
  })();
  </script>

  <footer>
    <span class="footer-logo">The Federated Republic</span>
    <div class="footer-social">
      <span class="footer-social-label">Follow</span>
      <a href="https://bsky.app/profile/federatedrepublic.bsky.social" target="_blank" rel="noopener">Bluesky</a>
      <a href="https://x.com/TheFedRepublic" target="_blank" rel="noopener">X</a>
      <a href="https://www.facebook.com/profile.php?id=61591764057032" target="_blank" rel="noopener">Facebook</a>
    </div>
    <span class="footer-note">A constitutional framework built from first principles &nbsp;&middot;&nbsp; A theoretical project, not the law of any existing nation</span>
  </footer>

  <script>
  </script>
  <script src="nav.js"></script>
</body>
</html>
